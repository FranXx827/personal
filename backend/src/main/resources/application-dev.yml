spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 10000
      max-lifetime: 1200000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        concurrency: 3
        max-concurrency: 10
      direct:
        acknowledge-mode: manual
        prefetch: 1

  flyway:
    enabled: false

# Redisson
redisson:
  single-server-config:
    address: redis://localhost:6379
    connection-pool-size: 16
    connection-minimum-idle-size: 4

# JWT
jwt:
  access-token-secret: dev-access-token-secret-key-must-be-at-least-256-bits-long
  access-token-expiration: 900000        # 15 min
  refresh-token-secret: dev-refresh-token-secret-key-must-be-at-least-256-bits-long
  refresh-token-expiration: 604800000    # 7 days
