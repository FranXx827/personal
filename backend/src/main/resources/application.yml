server:
  port: 8080

spring:
  application:
    name: ecommerce-backend

  profiles:
    active: dev

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# MyBatis-Plus
mybatis-plus:
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.ecommerce.modules

# XXL-JOB
xxl:
  job:
    admin:
      addresses: http://localhost:8088/xxl-job-admin
    access-token: default_token
    executor:
      appname: ${spring.application.name}
      port: 9999
      logpath: ./logs/xxl-job
      logretentiondays: 30

# Logging
logging:
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %logger{36} - [%X{traceId}] %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [%X{traceId}] %msg%n"
  file:
    name: ./logs/${spring.application.name}.log
  level:
    com.ecommerce: DEBUG
    org.springframework.security: INFO
